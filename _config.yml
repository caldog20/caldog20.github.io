# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Caleb's Blog
description: > # this means to ignore newlines until "baseurl:"
  An unspecific blog of crap
repository: https://github.com/caldog20/caldog20.github.io
baseurl: /blog  # the subpath of your site, e.g. /blog
url: https://caldog20.github.io  # the base hostname & protocol for your site

# Build settings
markdown: kramdown

# Sass settings
sass:
  style: compressed

# Theme settings
theme_mode: markdown  # choices are: 'dark', 'standard', 'markdown'

# Customizations
your_name: caleb yates
email: caldog20@gmail.com

navigation:
  - text: Home
    url: /
  - text: Docs
    url: /docs
  - text: Examples
    url: /examples

